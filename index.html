<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>中国象棋 - Chinese Chess</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            font-family: 'Noto Serif CJK SC', 'Noto Serif SC', 'Microsoft YaHei', 'PingFang SC', 'SimHei', serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        #app {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        #header {
            text-align: center;
            padding: 8px 0;
            width: 100%;
        }
        #header h1 {
            color: #ffd700;
            font-size: 1.6em;
            margin-bottom: 4px;
        }
        #status {
            color: #eee;
            font-size: 1em;
            min-height: 1.4em;
        }
        #game-container {
            width: 100%;
            aspect-ratio: 9 / 10;
            position: relative;
        }
        #board-canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #controls {
            display: flex;
            gap: 8px;
            padding: 10px 0;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }
        #controls button {
            background: #16213e;
            color: #ffd700;
            border: 1px solid #ffd70055;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 0.95em;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        #controls button:hover {
            background: #1a2a50;
        }
        #controls button:active {
            background: #0f1a30;
        }

        /* Info panel */
        #info-panel {
            width: 100%;
            background: #16213e;
            border: 1px solid #ffd70033;
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 4px;
        }
        #timer-display {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .info-label {
            color: #ffd700;
            font-size: 0.95em;
            white-space: nowrap;
        }
        #elapsed-time {
            color: #eee;
            font-size: 1em;
            font-variant-numeric: tabular-nums;
        }
        #history-panel {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        #move-history {
            max-height: 120px;
            overflow-y: auto;
            color: #ccc;
            font-size: 0.85em;
            line-height: 1.6;
            padding: 4px 0;
        }
        .move-entry {
            display: inline;
        }
        .move-entry.red {
            color: #e06060;
        }
        .move-entry.black {
            color: #aaa;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal.hidden,
        #info-panel.hidden {
            display: none;
        }
        .modal-content {
            background: #16213e;
            border: 1px solid #ffd70044;
            border-radius: 12px;
            padding: 24px;
            min-width: 280px;
            max-width: 90vw;
            text-align: center;
        }
        .modal-content h2 {
            color: #ffd700;
            margin-bottom: 16px;
            font-size: 1.3em;
        }
        .modal-content p {
            margin-bottom: 16px;
            color: #ccc;
        }
        .setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
        }
        .setting label {
            color: #ccc;
            font-size: 0.95em;
            white-space: nowrap;
        }
        .setting select {
            background: #0f1a30;
            color: #eee;
            border: 1px solid #ffd70033;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.95em;
            font-family: inherit;
            flex: 1;
        }
        .dialog-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 18px;
        }
        .dialog-buttons button,
        .modal-content > button {
            background: #1a2a50;
            color: #ffd700;
            border: 1px solid #ffd70055;
            border-radius: 8px;
            padding: 8px 22px;
            font-size: 1em;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .dialog-buttons button:hover,
        .modal-content > button:hover {
            background: #243560;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">
            <h1 data-i18n="title">中国象棋</h1>
            <div id="status" data-i18n="redTurn">红方走棋</div>
        </div>
        <div id="game-container">
            <canvas id="board-canvas"></canvas>
        </div>
        <div id="controls">
            <button id="new-game-btn" data-i18n="newGame">新游戏</button>
            <button id="undo-btn" data-i18n="undo">悔棋</button>
            <button id="settings-btn" data-i18n="settings">设置</button>
            <button id="sound-btn" data-i18n="soundOn">🔊 音效</button>
            <button id="lang-btn">EN</button>
        </div>
        <div id="info-panel" class="hidden">
            <div id="timer-display">
                <span class="info-label" data-i18n="time">时间:</span>
                <span id="elapsed-time">00:00</span>
            </div>
            <div id="history-panel">
                <span class="info-label" data-i18n="moveHistory">走棋记录:</span>
                <div id="move-history" aria-label="走棋记录"></div>
            </div>
        </div>
    </div>

    <!-- New Game Dialog -->
    <div id="new-game-dialog" class="modal hidden">
        <div class="modal-content">
            <h2 data-i18n="newGame">新游戏</h2>
            <div class="setting">
                <label data-i18n="gameMode">游戏模式:</label>
                <select id="game-mode-select">
                    <option value="PLAYER_VS_AI" data-i18n="pvai">人机对战</option>
                    <option value="PLAYER_VS_PLAYER" data-i18n="pvp">双人对战</option>
                    <option value="AI_VS_AI" data-i18n="aivai">电脑对战</option>
                    <option value="ONLINE" data-i18n="online">在线对战</option>
                </select>
            </div>
            <div class="setting" id="difficulty-setting">
                <label data-i18n="difficulty">难度:</label>
                <select id="difficulty-select">
                    <option value="BEGINNER" data-i18n="beginner">初级</option>
                    <option value="INTERMEDIATE" data-i18n="intermediate">中级</option>
                    <option value="ADVANCED" data-i18n="advanced">高级</option>
                    <option value="PROFESSIONAL" selected data-i18n="professional">专业</option>
                    <option value="MASTER" data-i18n="master">大师</option>
                    <option value="ML" data-i18n="mlAI">AI 神经网络</option>
                </select>
            </div>
            <div class="setting" id="color-setting">
                <label data-i18n="playAs">执棋:</label>
                <select id="color-select">
                    <option value="RED" data-i18n="redFirst">红方 (先手)</option>
                    <option value="BLACK" data-i18n="blackSecond">黑方 (后手)</option>
                </select>
            </div>
            <div class="dialog-buttons">
                <button id="start-game-btn" data-i18n="start">开始</button>
                <button id="cancel-btn" data-i18n="cancel">取消</button>
            </div>
        </div>
    </div>

    <!-- Online Game Dialog -->
    <div id="online-dialog" class="modal hidden">
        <div class="modal-content">
            <h2 data-i18n="online">在线对战</h2>
            <div id="online-menu">
                <div class="dialog-buttons" style="flex-direction:column;gap:12px">
                    <button id="create-game-btn" data-i18n="createGame">创建房间</button>
                    <button id="join-game-btn" data-i18n="joinGameBtn">加入房间</button>
                    <button id="online-back-btn" data-i18n="cancel">取消</button>
                </div>
            </div>
            <div id="online-waiting" style="display:none">
                <p data-i18n="gameCode" style="color:#ffd700;font-size:1.1em">房间号:</p>
                <p id="room-code-display" style="font-size:2em;color:#fff;letter-spacing:8px;margin:8px 0"></p>
                <button id="copy-code-btn" style="background:#1a2a50;color:#ffd700;border:1px solid #ffd70055;border-radius:6px;padding:6px 16px;cursor:pointer;font-family:inherit" data-i18n="copyCode">复制</button>
                <p style="margin-top:12px;color:#aaa" data-i18n="waiting">等待对手加入...</p>
                <div class="dialog-buttons" style="margin-top:16px">
                    <button id="cancel-online-btn" data-i18n="cancel">取消</button>
                </div>
            </div>
            <div id="online-join" style="display:none">
                <p data-i18n="enterCode" style="color:#ccc;margin-bottom:8px">输入房间号</p>
                <input id="join-code-input" type="text" maxlength="4" style="background:#0f1a30;color:#fff;border:1px solid #ffd70033;border-radius:6px;padding:10px;font-size:1.5em;text-align:center;letter-spacing:6px;width:160px;font-family:inherit;text-transform:uppercase" placeholder="____">
                <p id="join-error" style="color:#e06060;margin-top:8px;min-height:1.2em"></p>
                <div class="dialog-buttons">
                    <button id="confirm-join-btn" data-i18n="joinGameBtn">加入</button>
                    <button id="join-back-btn" data-i18n="cancel">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over Dialog -->
    <div id="game-over-dialog" class="modal hidden">
        <div class="modal-content">
            <h2 id="game-over-title"></h2>
            <p id="game-over-message"></p>
            <button id="game-over-new-game-btn" data-i18n="newGame">新游戏</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.0/dist/ort.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
